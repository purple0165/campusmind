<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CampusMind - 校园智能助手</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif; }
    .chat-bubble { max-width: 75%; word-break: break-word; overflow-wrap: break-word; }
    .scrollbar-thin::-webkit-scrollbar { width: 4px; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 2px; }
    .fade-in { animation: fadeIn 0.3s ease-out; }
    .slide-up { animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
    .scale-in { animation: scaleIn 0.2s ease-out; }
    .pulse-soft { animation: pulseSoft 2s infinite; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
    @keyframes pulseSoft { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
  </style>
</head>
<body class="bg-white min-h-screen">
  <div id="app"></div>

  <script>
    const API_BASE = "";
    const STATE = {
      token: localStorage.getItem("campusmind_token") || "",
      user: JSON.parse(localStorage.getItem("campusmind_user") || "null"),
      page: "login",
      messages: [],
      sessionId: localStorage.getItem("campusmind_session") || "",
      sessions: [],
      documents: [],
      loading: false,
      useReact: true,
      sidebarCollapsed: false,
    };

    function saveAuth() {
      if (STATE.token) {
        localStorage.setItem("campusmind_token", STATE.token);
        localStorage.setItem("campusmind_user", JSON.stringify(STATE.user));
      } else {
        localStorage.removeItem("campusmind_token");
        localStorage.removeItem("campusmind_user");
      }
    }

    function saveSession() {
      if (STATE.sessionId) localStorage.setItem("campusmind_session", STATE.sessionId);
      else localStorage.removeItem("campusmind_session");
    }

    async function loadSessions() {
      try {
        const resp = await api("/api/sessions");
        STATE.sessions = resp.sessions || [];
      } catch (err) {
        console.error("Failed to load sessions:", err);
        STATE.sessions = [];
      }
    }

    async function loadSessionMessages(sessionId) {
      try {
        const resp = await api(`/api/sessions/${sessionId}`);
        STATE.sessionId = sessionId;
        STATE.messages = resp.messages || [];
        saveSession();
        render();
      } catch (err) {
        console.error("Failed to load session:", err);
      }
    }

    function newSession() {
      STATE.sessionId = "";
      STATE.messages = [];
      saveSession();
      render();
    }

    async function api(path, options = {}) {
      const timeout = options.timeout || 10000;
      const headers = options.headers || {};
      if (STATE.token) headers["Authorization"] = "Bearer " + STATE.token;
      if (options.body && !(options.body instanceof FormData) && !headers["Content-Type"]) {
        headers["Content-Type"] = "application/json";
      }
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), timeout);
      try {
        const resp = await fetch(API_BASE + path, { ...options, headers, signal: controller.signal });
        clearTimeout(timeoutId);
        const ct = resp.headers.get("content-type") || "";
        let data = null;
        if (ct.includes("application/json")) {
          data = await resp.json().catch(() => ({}));
        } else {
          data = { detail: await resp.text() };
        }
        if (resp.status === 401 && !path.startsWith("/api/auth/")) {
          STATE.token = "";
          STATE.user = null;
          saveAuth();
          STATE.page = "login";
          render();
        }
        if (!resp.ok) {
          const msg = (data && (data.detail || data.error)) || ("请求失败: " + resp.status);
          throw new Error(typeof msg === "string" ? msg : JSON.stringify(msg));
        }
        return data;
      } catch (err) {
        clearTimeout(timeoutId);
        if (err.name === "AbortError") {
          throw new Error("请求超时");
        }
        throw err;
      }
    }

    function escapeHtml(s) {
      if (s == null) return "";
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function nl2br(s) {
      return escapeHtml(s).replace(/\n/g, "<br>");
    }

    function render() {
      const app = document.getElementById("app");
      if (STATE.user && STATE.token && (STATE.page === "login" || STATE.page === "register")) {
        STATE.page = "chat";
      }
      if (!STATE.user || !STATE.token) {
        if (STATE.page !== "register") STATE.page = "login";
        app.innerHTML = renderAuth();
        bindAuth();
        return;
      }
      app.innerHTML = renderApp();
      bindApp();
      if (STATE.page === "docs") loadDocuments();
    }

    function renderAuth() {
      const isLogin = STATE.page === "login";
      return `
        <div class="min-h-screen flex items-center justify-center p-4">
          <div class="w-full max-w-md slide-up">
            <div class="bg-white rounded-[24px] shadow-[0_20px_60px_-10px_rgba(59,130,246,0.15)] p-10 border border-slate-100">
              <div class="text-center mb-10">
                <div class="inline-flex items-center justify-center w-20 h-20 bg-gradient-to-br from-blue-500 via-indigo-500 to-purple-500 rounded-2xl mb-5 shadow-lg shadow-indigo-200">
                  <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
                  </svg>
                </div>
                <h1 class="text-3xl font-bold text-slate-800 tracking-tight">CampusMind</h1>
                <p class="text-slate-500 text-sm mt-3">校园智能问答助手</p>
              </div>
              <div class="flex mb-8 bg-white rounded-xl p-1.5">
                <button id="tab-login" class="flex-1 py-2.5 rounded-lg text-sm font-medium transition-all ${isLogin ? 'bg-white text-indigo-600 shadow-md' : 'text-slate-500 hover:text-slate-700'}">登录</button>
                <button id="tab-register" class="flex-1 py-2.5 rounded-lg text-sm font-medium transition-all ${!isLogin ? 'bg-white text-indigo-600 shadow-md' : 'text-slate-500 hover:text-slate-700'}">注册</button>
              </div>
              <form id="auth-form" class="space-y-5">
                <div>
                  <label class="block text-sm font-medium text-slate-600 mb-2">用户名</label>
                  <input id="username" type="text" required minlength="3" class="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent transition-all placeholder:text-slate-400 text-slate-800" placeholder="请输入用户名" />
                </div>
                <div>
                  <label class="block text-sm font-medium text-slate-600 mb-2">密码</label>
                  <div class="relative">
                    <input id="password" type="password" required minlength="6" class="w-full px-4 py-3 pr-11 bg-white border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent transition-all placeholder:text-slate-400 text-slate-800" placeholder="${isLogin ? '请输入密码' : '至少6位'}"/>
                    <button type="button" data-toggle-password="password" class="absolute right-3 top-1/2 -translate-y-1/2 w-7 h-7 flex items-center justify-center text-slate-400 hover:text-slate-600 transition-colors">
                      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                    </button>
                  </div>
                </div>
                ${!isLogin ? `
                <div>
                  <label class="block text-sm font-medium text-slate-600 mb-2">确认密码</label>
                  <div class="relative">
                    <input id="password2" type="password" required minlength="6" class="w-full px-4 py-3 pr-11 bg-white border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent transition-all placeholder:text-slate-400 text-slate-800" placeholder="再次输入密码"/>
                    <button type="button" data-toggle-password="password2" class="absolute right-3 top-1/2 -translate-y-1/2 w-7 h-7 flex items-center justify-center text-slate-400 hover:text-slate-600 transition-colors">
                      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                    </button>
                  </div>
                </div>` : ""}
                <div id="auth-error" class="text-red-500 text-sm hidden"></div>
                <button type="submit" id="auth-submit" class="w-full py-3.5 bg-gradient-to-r from-blue-500 via-indigo-500 to-purple-500 text-white rounded-xl font-medium hover:opacity-90 hover:shadow-xl hover:shadow-indigo-200 transition-all text-base">
                  ${isLogin ? "登录" : "注册"}
                </button>
              </form>
              <div class="mt-8 text-center text-slate-400 text-xs">
                登录即表示同意服务条款
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function bindAuth() {
      document.getElementById("tab-login").onclick = () => { STATE.page = "login"; render(); };
      document.getElementById("tab-register").onclick = () => { STATE.page = "register"; render(); };
      document.getElementById("auth-form").onsubmit = async (e) => {
        e.preventDefault();
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value;
        const password2 = document.getElementById("password2")?.value;

        const errEl = document.getElementById("auth-error");
        const btn = document.getElementById("auth-submit");
        errEl.classList.add("hidden");
        if (STATE.page === "register" && password !== password2) {
          errEl.textContent = "两次密码不一致"; errEl.classList.remove("hidden"); return;
        }
        btn.disabled = true; btn.textContent = "处理中...";
        try {
          const endpoint = STATE.page === "login" ? "/api/auth/login" : "/api/auth/register";
          if (STATE.page === "register") {
            await api(endpoint, { method: "POST", body: JSON.stringify({ username, password }) });
            const res = await api("/api/auth/login", { method: "POST", body: JSON.stringify({ username, password }) });
            handleLoginSuccess(res);
          } else {
            const res = await api(endpoint, { method: "POST", body: JSON.stringify({ username, password }) });
            handleLoginSuccess(res);
          }
        } catch (err) {
          errEl.textContent = err.message;
          errEl.classList.remove("hidden");
        } finally {
          btn.disabled = false;
          btn.textContent = STATE.page === "login" ? "登录" : "注册";
        }
      };
      document.querySelectorAll("[data-toggle-password]").forEach(btn => {
        btn.onclick = () => {
          const inputId = btn.dataset.togglePassword;
          const input = document.getElementById(inputId);
          if (!input) return;
          const isHidden = input.type === "password";
          input.type = isHidden ? "text" : "password";
          btn.innerHTML = isHidden
            ? `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/></svg>`
            : `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>`;
        };
      });
    }

    async function handleLoginSuccess(res) {
      STATE.token = res.user.token;
      STATE.user = { id: res.user.id, username: res.user.username, role: res.user.role };
      saveAuth();
      STATE.page = "chat";
      try {
        const resp = await api("/api/sessions");
        STATE.sessions = resp.sessions || [];
        const savedSessionId = localStorage.getItem("campusmind_session");
        if (savedSessionId && STATE.sessions.some(s => s.session_id === savedSessionId)) {
          try {
            const msgResp = await api(`/api/sessions/${savedSessionId}`);
            STATE.sessionId = savedSessionId;
            STATE.messages = msgResp.messages || [];
          } catch (e) {
            STATE.sessionId = "";
            STATE.messages = [];
          }
        } else if (STATE.sessions.length > 0) {
          const latest = STATE.sessions[0];
          try {
            const msgResp = await api(`/api/sessions/${latest.session_id}`);
            STATE.sessionId = latest.session_id;
            STATE.messages = msgResp.messages || [];
            saveSession();
          } catch (e) {
            STATE.sessionId = "";
            STATE.messages = [];
          }
        } else {
          STATE.sessionId = "";
          STATE.messages = [];
        }
      } catch (err) {
        console.error("Failed to load sessions after login:", err);
        STATE.sessions = [];
        STATE.sessionId = "";
        STATE.messages = [];
      }
      render();
    }

    function renderApp() {
      const sidebarWidth = STATE.sidebarCollapsed ? "pl-14" : "pl-52";
      return `
        <div class="flex h-screen">
          ${renderSidebar()}
          <main class="flex-1 flex flex-col bg-white ${sidebarWidth} overflow-y-auto overflow-x-hidden">
            ${STATE.page === "chat" ? renderChat() : STATE.page === "docs" ? renderDocs() : STATE.page === "settings" ? renderSettings() : renderAbout()}
          </main>
        </div>
      `;
    }

    function renderSidebar() {
      const items = [
        { key: "chat", label: "智能问答", icon: `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>` },
        { key: "docs", label: "文档管理", icon: `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>` },
        { key: "settings", label: "账号设置", icon: `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>` },
        { key: "about", label: "系统说明", icon: `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>` },
      ];
      const collapsed = STATE.sidebarCollapsed;
      const sidebarWidth = collapsed ? "w-14" : "w-52";
      const sessionsHtml = STATE.sessions.map(s => `
        <div data-session-item="${s.session_id}" class="relative group">
          <div data-session="${s.session_id}" class="w-full text-left px-4 py-2 rounded-lg hover:bg-indigo-50/50 transition-all cursor-pointer ${STATE.sessionId === s.session_id ? 'bg-indigo-50 text-indigo-600' : 'text-slate-600'}">
            <div class="pr-10">
              <div class="text-xs font-medium truncate">${escapeHtml(s.title)}</div>
              <div class="text-xs text-slate-400 mt-0.5">${new Date(s.updated_at).toLocaleDateString()}</div>
            </div>
            <button data-rename="${s.session_id}" class="absolute right-8 top-1/2 -translate-y-1/2 opacity-0 group-hover:opacity-100 w-5 h-5 flex items-center justify-center text-slate-400 hover:text-indigo-500 transition-all" title="重命名">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
            </button>
            <button data-delete="${s.session_id}" class="absolute right-3 top-1/2 -translate-y-1/2 opacity-0 group-hover:opacity-100 w-5 h-5 flex items-center justify-center text-slate-400 hover:text-red-500 transition-all" title="删除">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
            </button>
          </div>
        </div>
      `).join("");
      return `
        <aside class="${sidebarWidth} bg-white border-r border-slate-100 flex flex-col shadow-sm transition-all duration-300 overflow-hidden fixed top-0 left-0 h-full z-50">
          <div class="px-5 py-5 border-b border-slate-100">
            <div class="flex items-center gap-2.5">
              <div class="w-8 h-8 bg-gradient-to-br from-blue-500 via-indigo-500 to-purple-500 rounded-lg flex items-center justify-center shadow-md shadow-indigo-100 flex-shrink-0">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
                </svg>
              </div>
              ${!collapsed ? `<div>
                <div class="font-semibold text-slate-800 text-base">CampusMind</div>
                <div class="text-xs text-slate-400">v1.0</div>
              </div>` : ""}
            </div>
          </div>
          <nav class="py-3 border-b border-slate-100">
            ${items.map(it => `
              <button data-nav="${it.key}" class="w-full text-left px-5 py-2.5 flex items-center gap-3 hover:bg-indigo-50/50 transition-all ${STATE.page === it.key ? 'bg-gradient-to-r from-indigo-50 to-purple-50 text-indigo-600 border-l-2 border-indigo-500' : 'text-slate-600'}">
                <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">${it.icon}</svg>
                ${!collapsed ? `<span class="font-medium text-sm whitespace-nowrap">${it.label}</span>` : `<span class="absolute opacity-0 pointer-events-none text-xs bg-slate-800 text-white px-2 py-1 rounded whitespace-nowrap z-50 ml-8">${it.label}</span>`}
              </button>
            `).join("")}
          </nav>
          ${!collapsed ? `
          <div class="flex-1 flex flex-col overflow-hidden">
            <div class="px-5 py-2 border-b border-slate-100">
              <div class="flex items-center justify-between">
                <span class="text-xs font-medium text-slate-500">历史会话</span>
                <button id="new-session-btn" class="text-xs text-indigo-600 hover:text-indigo-700 font-medium">+ 新对话</button>
              </div>
            </div>
            <div class="flex-1 overflow-y-auto scrollbar-thin px-3 py-2 space-y-0.5 relative">
              ${sessionsHtml || `<div class="text-center text-slate-400 text-xs py-4">暂无会话</div>`}
            </div>
          </div>
          ` : ""}
          <div class="px-5 py-4 border-t border-slate-100">
            ${!collapsed ? `<div class="flex items-center gap-2.5 mb-3">
              <div class="w-8 h-8 bg-gradient-to-br from-indigo-100 to-purple-100 rounded-full flex items-center justify-center">
                <svg class="w-4.5 h-4.5 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                </svg>
              </div>
              <div>
                <div class="text-sm font-medium text-slate-800">${escapeHtml(STATE.user.username)}</div>
                <div class="text-xs text-slate-400">${escapeHtml(STATE.user.role)}</div>
              </div>
            </div>

    function getFilteredMessages() {
      const query = (STATE.searchQuery || "").trim().toLowerCase();
      if (!query) return STATE.messages.length ? STATE.messages : [
        { role: "assistant", content: "你好！我是 CampusMind 校园智能助手，有什么可以帮助你的？" }
      ];
      return STATE.messages.filter(m => m.content.toLowerCase().includes(query));
    }

    function countSearchMatches() {
      const query = (STATE.searchQuery || "").trim().toLowerCase();
      if (!query) return 0;
      return STATE.messages.filter(m => m.content.toLowerCase().includes(query)).length;
    }

    function highlightSearch(text) {
      const query = (STATE.searchQuery || "").trim();
      if (!query) return nl2br(text);
      const escaped = escapeHtml(text);
      const regex = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
      return escaped.replace(regex, '<mark class="bg-yellow-200 text-yellow-900 rounded px-0.5">$1</mark>').replace(/\n/g, "<br>");
    }

    function renderReactSteps(steps, msgId) {
      if (!steps || !steps.length) return "";
      const toolIcons = {
        "get_current_time": "🕐",
        "get_weather": "🌤️",
        "calculator": "🔢",
        "date_diff": "📅",
        "search_knowledge": "📚",
        "search": "📚",
      };
      const stepsHtml = steps.map((s) => {
        const icon = toolIcons[s.action] || "🔧";
        let actionHtml = "";
        if (s.action) {
          const inputStr = s.action_input && s.action_input !== "{}" ? s.action_input : "";
          actionHtml = `<div class="mt-2 flex flex-wrap items-center gap-1.5 text-xs"><span class="px-2 py-0.5 bg-amber-100 text-amber-700 rounded font-medium">行动</span><span class="text-slate-500">${icon} ${escapeHtml(s.action)}</span>${inputStr ? `<span class="text-slate-400 break-all">${escapeHtml(inputStr)}</span>` : ""}</div>`;
        }
        let obsHtml = "";
        if (s.observation) {
          const obsShort = s.observation.length > 300 ? s.observation.slice(0, 300) + "..." : s.observation;
          obsHtml = `<div class="mt-2 text-xs flex items-start gap-2"><span class="px-2 py-0.5 bg-green-100 text-green-700 rounded font-medium flex-shrink-0">观察</span><span class="text-slate-400 flex-1 break-all leading-relaxed">${escapeHtml(obsShort)}</span></div>`;
        }
        return `<div class="border-l-2 border-indigo-200 pl-3 py-1.5 mb-2 last:mb-0">
          <div class="text-xs flex items-start gap-2"><span class="px-2 py-0.5 bg-indigo-100 text-indigo-700 rounded font-medium flex-shrink-0">思考 ${s.iteration}</span><span class="text-slate-500 flex-1 break-all">${escapeHtml(s.thought || "")}</span></div>
          ${actionHtml}
          ${obsHtml}
        </div>`;
      }).join("");
      return `<div class="mb-3 react-steps-container max-w-[75%] overflow-hidden">
        <button onclick="toggleReactSteps('${msgId}')" class="w-full flex items-center justify-between bg-white hover:bg-white rounded-lg p-3 border border-slate-100 transition-all text-left">
          <div class="flex items-center gap-1.5 text-xs font-medium text-slate-500 min-w-0">
            <svg class="w-3 h-3 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
            <span class="truncate">ReAct 思考过程 (${steps.length}步)</span>
          </div>
          <svg id="react-arrow-${msgId}" class="w-3 h-3 text-slate-400 transition-transform duration-200 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
        </button>
        <div id="react-content-${msgId}" class="hidden mt-2 bg-white rounded-lg p-3 border border-slate-100 max-h-60 overflow-y-auto overflow-x-hidden scrollbar-thin break-all">${stepsHtml}</div>
      </div>`;
    }

    function renderMessage(m, idx) {
      if (m.role === "user") {
        return `<div class="flex justify-end fade-in">
          <div class="chat-bubble bg-gradient-to-r from-blue-500 via-indigo-500 to-purple-500 text-white px-4 py-3 rounded-2xl rounded-tr-sm shadow-lg shadow-indigo-100 whitespace-pre-wrap text-sm leading-relaxed break-all word-break break-word">${highlightSearch(m.content)}</div>

      const stepsHtml = m.steps ? renderReactSteps(m.steps, msgId) : "";

                <h3 class="text-base font-semibold text-slate-800 mb-4">使用说明</h3>
                <ol class="list-decimal list-inside space-y-3 text-sm text-slate-600">
                  <li>在「文档管理」中上传相关资料</li>
                  <li>切换到「智能问答」开始提问</li>
                  <li>系统会基于已有文档给出更精准的回答</li>
                </ol>
              </div>
              <div>
                <h3 class="text-base font-semibold text-slate-800 mb-4">技术栈</h3>
                <div class="flex flex-wrap gap-3">
                  <span class="px-4 py-2 bg-slate-50 text-slate-600 rounded-lg text-xs font-medium">FastAPI</span>
                  <span class="px-4 py-2 bg-slate-50 text-slate-600 rounded-lg text-xs font-medium">Uvicorn</span>
                  <span class="px-4 py-2 bg-slate-50 text-slate-600 rounded-lg text-xs font-medium">SQLAlchemy</span>
                  <span class="px-4 py-2 bg-slate-50 text-slate-600 rounded-lg text-xs font-medium">SQLite</span>
                  <span class="px-4 py-2 bg-slate-50 text-slate-600 rounded-lg text-xs font-medium">Tailwind CSS</span>
                  <span class="px-4 py-2 bg-slate-50 text-slate-600 rounded-lg text-xs font-medium">原生 JS</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function bindApp() {
      document.querySelectorAll("[data-nav]").forEach(btn => {
        btn.onclick = () => { 
          STATE.page = btn.dataset.nav; 
          if (STATE.page === "chat") loadSessions().then(() => render());
          else render();
        };
      });
      const lo = document.getElementById("logout-btn");
      if (lo) lo.onclick = () => {
        api("/api/auth/logout", { method: "POST" }).catch(() => {});
        STATE.token = ""; STATE.user = null; STATE.messages = []; STATE.sessionId = ""; STATE.sessions = [];
        saveAuth(); saveSession();
        STATE.page = "login";
        render();
      };
      const ts = document.getElementById("toggle-sidebar");
      if (ts) ts.onclick = () => {
        STATE.sidebarCollapsed = !STATE.sidebarCollapsed;
        render();
      };
      const ns = document.getElementById("new-session-btn");
      if (ns) ns.onclick = () => newSession();
      document.querySelectorAll("[data-session]").forEach(btn => {
        btn.onclick = () => loadSessionMessages(btn.dataset.session);
      });
      document.querySelectorAll("[data-delete]").forEach(btn => {
        btn.onclick = async (e) => {
          e.stopPropagation();
          const sessionId = btn.dataset.delete;
          if (!confirm("确定要删除这个会话吗？")) return;
          try {
            await api(`/api/sessions/${sessionId}/delete`, { method: "POST" });
            await loadSessions();
            if (STATE.sessionId === sessionId) newSession();
            else render();
          } catch (err) {
            alert("删除失败: " + err.message);
          }
        };
      });
      document.querySelectorAll("[data-rename]").forEach(btn => {
        btn.onclick = async (e) => {
          e.stopPropagation();
          const sessionId = btn.dataset.rename;
          const session = STATE.sessions.find(s => s.session_id === sessionId);
          if (!session) return;
          const newTitle = prompt("请输入新的会话名称：", session.title);
          if (newTitle == null || !newTitle.trim()) return;
          try {
            await api(`/api/sessions/${sessionId}/rename`, {
              method: "POST",
              body: JSON.stringify({ title: newTitle.trim() }),
            });
            const idx = STATE.sessions.findIndex(s => s.session_id === sessionId);
            if (idx >= 0) STATE.sessions[idx].title = newTitle.trim();
            render();
          } catch (err) {
            alert("重命名失败: " + err.message);
          }
        };
      });
      document.querySelectorAll("[data-nav]").forEach(btn => {
        const tooltip = btn.querySelector("span.absolute");
        if (tooltip) {
          btn.onmouseenter = () => { tooltip.classList.remove("opacity-0"); };
          btn.onmouseleave = () => { tooltip.classList.add("opacity-0"); };
        }
      });
      if (STATE.page === "chat") bindChat();
      else if (STATE.page === "docs") bindDocs();
      else if (STATE.page === "settings") bindSettings();
    }

    function bindSettings() {
      const form = document.getElementById("password-form");
      if (!form) return;
      form.onsubmit = async (e) => {
        e.preventDefault();
        const oldPw = document.getElementById("old-password").value;
        const newPw = document.getElementById("new-password").value;
        const confirmPw = document.getElementById("confirm-password").value;
        const errEl = document.getElementById("password-error");
        const okEl = document.getElementById("password-success");
        const btn = document.getElementById("password-submit");
        errEl.classList.add("hidden");
        okEl.classList.add("hidden");
        if (newPw !== confirmPw) {
          errEl.textContent = "两次输入的新密码不一致";
          errEl.classList.remove("hidden");
          return;
        }
        btn.disabled = true;
        btn.textContent = "修改中...";
        try {
          await api("/api/auth/change-password", {
            method: "POST",
            body: JSON.stringify({ old_password: oldPw, new_password: newPw }),
          });
          okEl.textContent = "密码修改成功！";
          okEl.classList.remove("hidden");
          form.reset();
        } catch (err) {
          errEl.textContent = err.message || "修改失败";
          errEl.classList.remove("hidden");
        } finally {
          btn.disabled = false;
          btn.textContent = "确认修改";
        }
      };
    }

    function renderChatMessagesOnly() {
      const container = document.getElementById("chat-messages");
      if (!container) return;
      const msgs = STATE.messages.length ? STATE.messages : [
        { role: "assistant", content: "你好！我是 CampusMind 校园智能助手，有什么可以帮助你的？" }
      ];
      container.innerHTML = msgs.map((m, i) => renderMessage(m, i)).join("");
      container.scrollTop = container.scrollHeight;
    }

    function appendMessageEl(m, index) {
      const container = document.getElementById("chat-messages");
      if (!container) return null;
      const wrapper = document.createElement("div");
      wrapper.innerHTML = renderMessage(m, index);
      const el = wrapper.firstElementChild;
      if (el) {
        el.dataset.msgIndex = index;
        container.appendChild(el);
        container.scrollTop = container.scrollHeight;
        return el;
      }
      return null;
    }

    function updateMessageEl(el, content) {
      if (!el) return;
      const bubble = el.querySelector(".chat-bubble");
      if (bubble) {
        bubble.innerHTML = nl2br(content);
        const container = document.getElementById("chat-messages");
        if (container) container.scrollTop = container.scrollHeight;
      }
    }

    function bindChat() {
      const input = document.getElementById("chat-input");
      const submitBtn = document.getElementById("chat-submit");
      if (!input || !submitBtn) return;

      async function sendQuestion() {
        const q = input.value.trim();
        if (!q || STATE.loading) return;
        STATE.loading = true;
        input.value = "";

        STATE.messages.push({ role: "user", content: q });
        appendMessageEl({ role: "user", content: q }, STATE.messages.length - 1);

        STATE.messages.push({ role: "assistant", content: "" });
        const assistantEl = appendMessageEl({ role: "assistant", content: "" }, STATE.messages.length - 1);
        const assistantMsgIndex = STATE.messages.length - 1;

        let currentSteps = [];
        let currentAnswer = "";

        try {
          const headers = {};
          headers["Content-Type"] = "application/json";
          if (STATE.token) headers["Authorization"] = "Bearer " + STATE.token;

          const resp = await fetch(API_BASE + "/api/query/react/stream", {
            method: "POST",
            headers: headers,
            body: JSON.stringify({ question: q, session_id: STATE.sessionId || null }),
          });

          if (!resp.ok) {
            throw new Error("请求失败: " + resp.status);
          }

          const reader = resp.body.getReader();
          const decoder = new TextDecoder("utf-8");
          let buffer = "";

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split("\n");
            buffer = lines.pop() || "";

            for (const line of lines) {
              if (!line.trim()) continue;
              try {
                const event = JSON.parse(line.trim());
                  if (event.session_id) STATE.sessionId = event.session_id;

                  if (event.type === "thinking") {
                    const thinkingText = `思考中... ${event.partial || ""}`;
                    STATE.messages[assistantMsgIndex] = { role: "assistant", content: thinkingText, steps: currentSteps };
                    if (currentSteps.length) {
                      updateMessageElWithSteps(assistantEl, thinkingText, currentSteps);
                    } else {
                      updateMessageEl(assistantEl, thinkingText);
                    }
                  } else if (event.type === "steps") {
                    currentSteps = event.steps || [];
                    STATE.messages[assistantMsgIndex] = { role: "assistant", content: currentAnswer, steps: currentSteps };
                    updateMessageElWithSteps(assistantEl, currentAnswer, currentSteps);
                  } else if (event.type === "observation") {
                    const obsText = `观察: ${event.observation || ""}`;
                    STATE.messages[assistantMsgIndex] = { role: "assistant", content: obsText, steps: currentSteps };
                    if (currentSteps.length) {
                      updateMessageElWithSteps(assistantEl, obsText, currentSteps);
                    } else {
                      updateMessageEl(assistantEl, obsText);
                    }
                  } else if (event.type === "answer") {
                    currentAnswer = event.answer || "";
                    STATE.messages[assistantMsgIndex] = { role: "assistant", content: currentAnswer, steps: currentSteps };
                    if (currentSteps.length) {
                      updateMessageElWithSteps(assistantEl, currentAnswer, currentSteps);
                    } else {
                      updateMessageEl(assistantEl, currentAnswer);
                    }
                  } else if (event.type === "error") {
                    throw new Error(event.error || "未知错误");
                  }
                } catch (parseErr) {
                  console.error("解析事件失败:", parseErr);
                }
            }
          }

          saveSession();
          await loadSessions();

          if (currentAnswer && STATE.token) {
            try {
              await api("/api/query/react", {
                method: "POST",
                body: JSON.stringify({ question: q, session_id: STATE.sessionId }),
              });
            } catch (saveErr) {
              console.warn("保存消息失败:", saveErr);
            }
          }
        } catch (err) {
          STATE.messages[assistantMsgIndex] = { role: "assistant", content: "错误: " + err.message };
          updateMessageEl(assistantEl, "错误: " + err.message);
        } finally {
          STATE.loading = false;
        }
      }

      function updateMessageElWithSteps(el, content, steps) {
        if (!el) return;
        const msgIndex = el.dataset.msgIndex;
        const msgId = `msg-${msgIndex || Math.random().toString(36).slice(2)}`;
        const flexContainer = el.querySelector(".flex-1");
        if (flexContainer) {
          flexContainer.innerHTML = renderReactSteps(steps, msgId) + `<div class="chat-bubble bg-white border border-slate-100 px-4 py-3 rounded-2xl rounded-tl-sm text-slate-700 shadow-sm whitespace-pre-wrap text-sm leading-relaxed break-all word-break break-word">${nl2br(content)}</div>`;
        } else {
          el.innerHTML = renderReactSteps(steps, msgId) + `<div class="chat-bubble bg-white border border-slate-100 px-4 py-3 rounded-2xl rounded-tl-sm text-slate-700 shadow-sm whitespace-pre-wrap text-sm leading-relaxed break-all">${nl2br(content)}</div>`;
        }
        const container = document.getElementById("chat-messages");
        if (container) container.scrollTop = container.scrollHeight;
      }

      submitBtn.onclick = sendQuestion;
      input.onkeydown = (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendQuestion();
        }
      };
      const st = document.getElementById("search-toggle");
      if (st) st.onclick = () => {
        if (STATE.searchQuery != null) {
          STATE.searchQuery = null;
        } else {
          STATE.searchQuery = "";
        }
        render();
        if (STATE.searchQuery != null) {
          setTimeout(() => {
            const input = document.getElementById("search-input");
            if (input) input.focus();
          }, 50);
        }
      };
      const si = document.getElementById("search-input");
      if (si) {
        si.oninput = (e) => {
          const pos = e.target.selectionStart;
          STATE.searchQuery = e.target.value;
          render();
          setTimeout(() => {
            const input = document.getElementById("search-input");
            if (input) {
              input.focus();
              try { input.setSelectionRange(pos, pos); } catch (_) {}
            }
          }, 0);
        };
      }
      const sc = document.getElementById("search-clear");
      if (sc) sc.onclick = () => {
        STATE.searchQuery = null;
        render();
      };
      const clr = document.getElementById("clear-session");
      if (clr) clr.onclick = async () => {
        if (!STATE.sessionId) {
          STATE.messages = [];
          render();
          return;
        }
        if (!confirm("确定要清空当前对话的所有消息吗？此操作不可恢复。")) return;
        try {
          await api("/api/session/clear", { method: "POST", body: JSON.stringify({ session_id: STATE.sessionId }) });
          const idx = STATE.sessions.findIndex(s => s.session_id === STATE.sessionId);
          if (idx >= 0) STATE.sessions[idx].title = "新对话";
          STATE.messages = [];
          saveSession();
          render();
        } catch (err) {
          alert("清空失败: " + err.message);
        }
      };
    }

    async function loadDocuments() {
      const list = document.getElementById("docs-list");
      if (!list) return;
      list.innerHTML = `<div class="text-slate-400">加载中...</div>`;
      try {
        const res = await api("/api/documents");
        STATE.documents = res.documents || [];
        renderDocList();
      } catch (err) {
        list.innerHTML = `<div class="text-red-500">加载失败: ${escapeHtml(err.message)}</div>`;
      }
    }

    function formatFileSize(bytes) {
      if (bytes < 1024) return bytes + " B";
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
      return (bytes / (1024 * 1024)).toFixed(1) + " MB";
    }

    function renderDocList() {
      const list = document.getElementById("docs-list");
      if (!list) return;
      if (!STATE.documents.length) {
        list.innerHTML = `<div class="text-slate-400 flex items-center gap-2"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg> 暂无已索引文档</div>`;
        return;
      }
      list.innerHTML = STATE.documents.map(d => {
        const name = d.name || (d.source || "").split(/[\\/]/).pop();
        const size = d.size ? formatFileSize(d.size) : "";
        return `<div class="flex items-center justify-between p-3 bg-slate-50 rounded-xl">
          <div class="flex-1 min-w-0">
            <div class="text-slate-700 font-medium truncate" title="${escapeHtml(d.source)}">📄 ${escapeHtml(name)}</div>
            ${size ? `<div class="text-xs text-slate-400 mt-0.5">${size}</div>` : ""}
          </div>
          <button data-del="${escapeHtml(d.source)}" class="ml-3 text-xs text-red-500 hover:text-red-600 font-medium">删除</button>
        </div>`;
      }).join("");
      list.querySelectorAll("[data-del]").forEach(btn => {
        btn.onclick = async () => {
          if (!confirm("确定删除该文档？")) return;
          try {
            await api("/api/documents/" + encodeURIComponent(btn.dataset.del), { method: "DELETE" });
            loadDocuments();
          } catch (err) {
            alert("删除失败: " + err.message);
          }
        };
      });
    }

    function bindDocs() {
      const btn = document.getElementById("upload-btn");
      const input = document.getElementById("file-input");
      const status = document.getElementById("upload-status");
      btn.onclick = async () => {
        const files = input.files;
        if (!files || !files.length) { status.textContent = "请先选择文件"; status.className = "mt-5 text-sm text-amber-600"; return; }
        const fd = new FormData();
        for (const f of files) fd.append("files", f);
        status.textContent = "上传中...";
        status.className = "mt-5 text-sm text-slate-600";
        btn.disabled = true;
        try {
          const res = await api("/api/documents/upload", { method: "POST", body: fd });
          status.textContent = `成功！保存 ${res.saved_count} 个文件，建立 ${res.indexed_chunks} 个索引块`;
          status.className = "mt-5 text-sm text-indigo-600";
          input.value = "";
          loadDocuments();
        } catch (err) {
          status.textContent = "失败: " + err.message;
          status.className = "mt-5 text-sm text-red-500";
        } finally {
          btn.disabled = false;
        }
      };
      document.getElementById("refresh-docs").onclick = loadDocuments;
    }

    function toggleReactSteps(msgId) {
      const content = document.getElementById(`react-content-${msgId}`);
      const arrow = document.getElementById(`react-arrow-${msgId}`);
      if (content && arrow) {
        if (content.classList.contains("hidden")) {
          content.classList.remove("hidden");
          arrow.style.transform = "rotate(180deg)";
        } else {
          content.classList.add("hidden");
          arrow.style.transform = "rotate(0deg)";
        }
      }
    }

    async function init() {
      console.log("[DEBUG] init() started");
      try {
        if (STATE.token) {
          console.log("[DEBUG] token found, checking auth");
          try {
            const me = await api("/api/auth/me");
            STATE.user = { id: me.id, username: me.username, role: me.role };
            saveAuth();
            STATE.page = "chat";
            console.log("[DEBUG] auth ok, loading sessions");
            try {
              const resp = await api("/api/sessions");
              STATE.sessions = resp.sessions || [];
              console.log(`[DEBUG] loaded ${STATE.sessions.length} sessions`);
              const savedSessionId = localStorage.getItem("campusmind_session");
              if (savedSessionId && STATE.sessions.some(s => s.session_id === savedSessionId)) {
                try {
                  const msgResp = await api(`/api/sessions/${savedSessionId}`);
                  STATE.sessionId = savedSessionId;
                  STATE.messages = msgResp.messages || [];
                  console.log(`[DEBUG] restored session ${savedSessionId}`);
                } catch (e) {
                  console.warn("Failed to restore saved session:", e);
                  STATE.sessionId = "";
                  saveSession();
                }
              } else if (STATE.sessions.length > 0) {
                const latest = STATE.sessions[0];
                try {
                  const msgResp = await api(`/api/sessions/${latest.session_id}`);
                  STATE.sessionId = latest.session_id;
                  STATE.messages = msgResp.messages || [];
                  saveSession();
                  console.log(`[DEBUG] loaded latest session ${latest.session_id}`);
                } catch (e) {
                  console.warn("Failed to load latest session:", e);
                }
              }
            } catch (err) {
              console.error("Failed to load sessions on init:", err);
            }
          } catch (err) {
            console.warn("Auth check failed:", err);
            STATE.token = "";
            STATE.user = null;
            STATE.sessionId = "";
            STATE.sessions = [];
            STATE.messages = [];
            saveAuth();
            saveSession();
            STATE.page = "login";
          }
        } else {
          console.log("[DEBUG] no token, showing login");
          STATE.page = "login";
        }
        console.log("[DEBUG] rendering page:", STATE.page);
        render();
        console.log("[DEBUG] init() completed");
      } catch (err) {
        console.error("[ERROR] init() failed:", err);
        STATE.page = "login";
        render();
      }
    }

    init();
  </script>
</body>
</html>
